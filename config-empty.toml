[1001TL_HEADERS]
Host = "www.1001tracklists.com"
User-Agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:149.0) Gecko/20100101 Firefox/149.0"
Accept = "application/json, text/javascript, */*; q=0.01"
